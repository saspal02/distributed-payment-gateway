spring:
  application:
    name: razorpay
  datasource:
    url: jdbc:postgresql://localhost:5432/${PSQL_DATABASE}
    username: ${PSQL_USER}
    password: ${PSQL_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect